version: '3.8'

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.0
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__WEBSERVER__SECRET_KEY: 'ecommerce-pipeline-secret'
    PYTHONPATH: /opt/airflow/dags
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', 'airflow']
      interval: 5s
      retries: 5

  airflow-init:
    <<: *airflow-common
    command: >
      bash -c 'pip install faker==24.0.0 pandas==2.2.0 apache-airflow-providers-amazon==8.20.0 boto3==1.34.0 --quiet &&
      airflow db init &&
      airflow users create --username airflow --password airflow
      --firstname Admin --lastname User --role Admin
      --email admin@example.com'
    restart: on-failure

  airflow-webserver:
    <<: *airflow-common
    command: >
      bash -c 'pip install faker==24.0.0 pandas==2.2.0 apache-airflow-providers-amazon==8.20.0 boto3==1.34.0 --quiet &&
      airflow webserver'
    ports:
      - '8080:8080'
    healthcheck:
      test: ['CMD', 'curl', '--fail', 'http://localhost:8080/health']
      interval: 30s
      retries: 5
    restart: always

  airflow-scheduler:
    <<: *airflow-common
    command: >
      bash -c 'pip install faker==24.0.0 pandas==2.2.0 apache-airflow-providers-amazon==8.20.0 boto3==1.34.0 --quiet &&
      airflow scheduler'
    restart: always
